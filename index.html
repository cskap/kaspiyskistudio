<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaspiyski Studio</title>
<link rel="icon" href="https://github.com/cskap/kaspiyskistudio/blob/main/3213.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&amp;family=Cormorant+Garamond:ital@1&amp;display=swap" rel="stylesheet">
<style>
  /* Базовые сбросы */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* Фоновое видео */
  .bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
  }

  /* Затемнение поверх видео */
  .video-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: -1;
  }

  body {
    min-height: 100vh;
    font-family: 'Benzin', 'Rajdhani', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Карточка по центру */
  .card {
    text-align: center;
    padding: 40px 30px;
    width: 100%;
    max-width: 400px;
  }

  /* Аватар */
  .avatar-ring {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin: 0 auto 20px;
    border: 1.5px solid rgba(255,255,255,0.15);
    overflow: hidden;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }

  .avatar-ring img {
    width: 100%; 
    height: 100%;
    object-fit: cover;
  }

  .avatar-ring:hover {
    transform: scale(1.02);
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  }

  /* Имя */
  .name {
    font-size: 2.5rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: #ffffff;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.14em;
    margin-bottom: 25px;
  }
  
  .divider {
    width: 40px; 
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 0 auto 28px;
  }

  /* Кнопки-ссылки */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 390px;
    margin: 0 auto;
  }
  
  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 14px 22px;
    background: linear-gradient(135deg, #0f0f0f 0%, #1f1f1f 25%, #0f0f0f 50%, #1f1f1f 75%, #0f0f0f 100%);
    background-size: 300% 300%;
    background-position: 0% 0%;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    text-decoration: none;
    color: #ffffff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: background-position 0.8s ease, transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), border-color 0.4s ease, box-shadow 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .link-btn:hover {
    background-position: 100% 100%;
    border-color: rgba(255,255,255,0.3);
    transform: translateX(5px);
    box-shadow: 0 5px 25px rgba(0,0,0,0.5);
  }

  .footer {
    margin-top: 36px;
    font-size: 0.62rem;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }

  /* Анимация появления кнопок */
  .link-btn {
    opacity: 0;
    animation: fadeInUp 0.5s ease forwards;
  }

  .link-btn:nth-child(1) { animation-delay: 0.1s; }
  .link-btn:nth-child(2) { animation-delay: 0.2s; }
  .link-btn:nth-child(3) { animation-delay: 0.3s; }
  .link-btn:nth-child(4) { animation-delay: 0.4s; }
  .link-btn:nth-child(5) { animation-delay: 0.5s; }
  .link-btn:nth-child(6) { animation-delay: 0.6s; }

  @keyframes fadeInUp {
    from { 
      opacity: 0; 
      transform: translateY(15px); 
    }
    to { 
      opacity: 1; 
      transform: translateY(0); 
    }
  }

  .link-btn:hover {
    transform: translateX(5px) !important;
  }

  /* Если видео не загрузилось или на телефонах */
  @media (max-width: 768px) {
    .bg-video {
      display: none;
    }
    body {
      background: #0a0a0a;
    }
  }
</style>
</head>
<body>

<!-- Фоновое видео -->
<video class="bg-video" autoplay loop muted playsinline>
    <source src="video/bg.mp4" type="video/mp4">
    Ваш браузер не поддерживает фоновое видео.
</video>
<div class="video-overlay"></div>

<div class="card">
  <div class="avatar-ring">
    <img src="images/3213.png" alt="Kaspiyski Studio">
  </div>
  <h1 class="name">Kaspiyski Studio</h1>
  <p class="tagline">Визуальное решение для вашего бизнеса</p>
  <div class="divider"></div>
  
  <div class="links">
    <a class="link-btn" href="https://t.me/KaspiyskiStudio" target="_blank">
      <span class="link-text">Студия</span>
    </a>
    <a class="link-btn" href="https://t.me/kaspiyski_work" target="_blank">
      <span class="link-text">Портфолио</span>
    </a>
    <a class="link-btn" href="https://t.me/kaspiyski_work/13" target="_blank">
      <span class="link-text">Прайс-Лист</span>
    </a>  
    <a class="link-btn" href="https://t.me/kaspiyski_rep" target="_blank">
      <span class="link-text">Отзывы</span>
    </a>  
    <a class="link-btn" href="https://t.me/KaspiyskiDesign" target="_blank">
      <span class="link-text">Канал</span>
    </a>  
    <a class="link-btn" href="https://t.me/ebiboby" target="_blank">
      <span class="link-text">Заказать</span>
    </a>  
  </div>
  
  <p class="footer">© 2025 Kaspiyski Studio</p>
</div>

</body>
</html>
